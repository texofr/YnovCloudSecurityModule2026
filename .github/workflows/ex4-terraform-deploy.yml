name: Ex4 Terraform Deploy

on:
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Deploy after Terraform plan'
        required: false
        default: true
        type: boolean

env:
  TF_WORKING_DIR: Exercices/Terraform/Ex4
  TF_IN_AUTOMATION: "true"

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest
    environment: dev
    env:
      ARM_USE_OIDC: "true"
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC with managed identity)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          auth-type: SERVICE_PRINCIPAL

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Format Check
        run: terraform -chdir=${{ env.TF_WORKING_DIR }} fmt -check -recursive

      - name: Terraform Init
        run: terraform -chdir=${{ env.TF_WORKING_DIR }} init

      - name: Terraform Validate
        run: terraform -chdir=${{ env.TF_WORKING_DIR }} validate

      - name: Terraform Plan
        run: terraform -chdir=${{ env.TF_WORKING_DIR }} plan -var-file=terraform.tfvars -out=tfplan

      - name: Terraform Apply
        if: ${{ github.event.inputs.deploy == 'true' }}
        run: terraform -chdir=${{ env.TF_WORKING_DIR }} apply -auto-approve tfplan

      - name: Show key outputs
        if: ${{ github.event.inputs.deploy == 'true' }}
        shell: bash
        run: |
          echo "resource_group_name=$(terraform -chdir=${{ env.TF_WORKING_DIR }} output -raw resource_group_name)"
          echo "vm_front_private_ip=$(terraform -chdir=${{ env.TF_WORKING_DIR }} output -raw vm_front_private_ip)"
          echo "vm_back_private_ip=$(terraform -chdir=${{ env.TF_WORKING_DIR }} output -raw vm_back_private_ip)"
          echo "log_analytics_workspace_name=$(terraform -chdir=${{ env.TF_WORKING_DIR }} output -raw log_analytics_workspace_name)"
          echo "flow_log_name=$(terraform -chdir=${{ env.TF_WORKING_DIR }} output -raw flow_log_name)"
