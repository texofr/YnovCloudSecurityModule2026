name: Ex3 Terraform and Docker Destroy

on:
  workflow_dispatch:
    inputs:
      confirm_destroy:
        description: 'Type "destroy" to confirm infrastructure deletion'
        required: true
        default: ""

env:
  TF_WORKING_DIR: Exercices/Terraform/Ex3
  TF_IN_AUTOMATION: "true"

permissions:
  id-token: write
  contents: read

jobs:
  destroy:
    runs-on: ubuntu-latest
    environment: dev
    env:
      ARM_USE_OIDC: "true"
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    steps:
      - name: Validate confirmation
        if: ${{ github.event.inputs.confirm_destroy != 'destroy' }}
        run: |
          echo "You must type 'destroy' in confirm_destroy to run this workflow."
          exit 1

      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC with managed identity)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          auth-type: WORKLOAD_IDENTITY_FEDERATION

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform -chdir=${{ env.TF_WORKING_DIR }} init

      - name: Terraform Destroy
        run: terraform -chdir=${{ env.TF_WORKING_DIR }} destroy -auto-approve
