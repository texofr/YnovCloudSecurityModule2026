name: Ex3 Terraform and Docker Deploy

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  security-events: write

env:
  TF_WORKING_DIR: Exercices/Terraform/Ex3
  APP_DIR: Exercices/Terraform/Ex3/app
  DOCKERFILE_PATH: Exercices/Terraform/Ex3/docker/Dockerfile
  TF_IN_AUTOMATION: "true"

jobs:
  terraform:
    runs-on: ubuntu-latest
    environment: dev
    env:
      ARM_USE_OIDC: "true"
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
    outputs:
      acr_name: ${{ steps.tfout.outputs.acr_name }}
      acr_login_server: ${{ steps.tfout.outputs.acr_login_server }}
      web_app_name: ${{ steps.tfout.outputs.web_app_name }}
      rg_name: ${{ steps.tfout.outputs.rg_name }}
      docker_image_name: ${{ steps.tfout.outputs.docker_image_name }}
      web_app_url: ${{ steps.tfout.outputs.web_app_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC with managed identity)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          auth-type: WORKLOAD_IDENTITY_FEDERATION

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Format Check
        run: terraform -chdir=${{ env.TF_WORKING_DIR }} fmt -check -recursive

      - name: Terraform Init
        run: terraform -chdir=${{ env.TF_WORKING_DIR }} init

      - name: Terraform Validate
        run: terraform -chdir=${{ env.TF_WORKING_DIR }} validate

      - name: Trivy IaC report (SARIF)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: ${{ env.TF_WORKING_DIR }}
          format: sarif
          output: trivy-iac-results.sarif
          severity: CRITICAL,HIGH,MEDIUM,LOW
          exit-code: "0"

      - name: Upload Trivy IaC SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-iac-results.sarif
          category: trivy-iac

      - name: Upload Trivy IaC report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-iac-sarif-report
          path: trivy-iac-results.sarif
          retention-days: 30

      - name: Security gate - fail on critical IaC misconfiguration
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: ${{ env.TF_WORKING_DIR }}
          format: table
          output: trivy-iac-critical.txt
          severity: CRITICAL
          exit-code: "1"

      - name: Upload Trivy IaC critical gate report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-iac-critical-gate
          path: trivy-iac-critical.txt
          retention-days: 30

      - name: Terraform Plan
        run: terraform -chdir=${{ env.TF_WORKING_DIR }} plan -out=tfplan

      - name: Terraform Apply
        run: terraform -chdir=${{ env.TF_WORKING_DIR }} apply -auto-approve tfplan

      - name: Export Terraform outputs
        id: tfout
        shell: bash
        run: |
          echo "acr_name=$(terraform -chdir=${{ env.TF_WORKING_DIR }} output -raw acr_name)" >> "$GITHUB_OUTPUT"
          echo "acr_login_server=$(terraform -chdir=${{ env.TF_WORKING_DIR }} output -raw acr_login_server)" >> "$GITHUB_OUTPUT"
          echo "web_app_name=$(terraform -chdir=${{ env.TF_WORKING_DIR }} output -raw web_app_name)" >> "$GITHUB_OUTPUT"
          echo "rg_name=$(terraform -chdir=${{ env.TF_WORKING_DIR }} output -raw resource_group_name)" >> "$GITHUB_OUTPUT"
          echo "docker_image_name=$(terraform -chdir=${{ env.TF_WORKING_DIR }} output -raw docker_image_name)" >> "$GITHUB_OUTPUT"
          echo "web_app_url=https://$(terraform -chdir=${{ env.TF_WORKING_DIR }} output -raw web_app_default_hostname)" >> "$GITHUB_OUTPUT"

  docker:
    runs-on: ubuntu-latest
    needs: terraform
    environment: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC with managed identity)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          auth-type: WORKLOAD_IDENTITY_FEDERATION

      - name: Login to ACR
        run: az acr login --name ${{ needs.terraform.outputs.acr_name }}

      - name: Prepare image tags
        id: image
        shell: bash
        run: |
          echo "image_sha=${{ needs.terraform.outputs.acr_login_server }}/${{ needs.terraform.outputs.docker_image_name }}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "image_latest=${{ needs.terraform.outputs.acr_login_server }}/${{ needs.terraform.outputs.docker_image_name }}:latest" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        shell: bash
        run: |
          docker build \
            -f "${{ env.DOCKERFILE_PATH }}" \
            -t "${{ steps.image.outputs.image_sha }}" \
            -t "${{ steps.image.outputs.image_latest }}" \
            "${{ env.APP_DIR }}"

      - name: Trivy report (SARIF)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.image.outputs.image_sha }}
          format: sarif
          output: trivy-results.sarif
          vuln-type: os,library
          severity: CRITICAL,HIGH,MEDIUM,LOW
          exit-code: "0"

      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      - name: Upload Trivy report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-sarif-report
          path: trivy-results.sarif
          retention-days: 30

      - name: Security gate - fail on critical CVEs
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.image.outputs.image_sha }}
          format: table
          output: trivy-critical.txt
          vuln-type: os,library
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      - name: Upload Trivy critical gate report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-critical-gate
          path: trivy-critical.txt
          retention-days: 30

      - name: Push Docker image
        shell: bash
        run: |
          docker push "${{ steps.image.outputs.image_sha }}"
          docker push "${{ steps.image.outputs.image_latest }}"

      - name: Restart Web App to pull latest image
        run: |
          az webapp restart \
            --name ${{ needs.terraform.outputs.web_app_name }} \
            --resource-group ${{ needs.terraform.outputs.rg_name }}

      - name: Show Application URL
        run: echo "Application deployed at ${{ needs.terraform.outputs.web_app_url }}"
